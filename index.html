<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Google Sheet Dashboard</title>

<style>

body{
margin:0;
padding:30px;
background:#f5f7fb;
font-family:Arial;
}

.card{
background:#fff;
padding:24px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.08);
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#2563eb;
color:white;
padding:12px;
}

td{
padding:10px;
border-bottom:1px solid #eee;
}

.loading{
padding:30px;
}

</style>

</head>

<body>

<div class="card">

<h2>📊 Google Sheet</h2>

<div id="loading" class="loading">
Đang tải...
</div>

<table id="tbl"></table>

</div>

<script>

const SHEET =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vTk1CRFRmD-uRKJuGAGi3RCkd5wf-hcj77Tyy4isvHWAMb749HZSfHVIBzepVRKrTMDWM1tyTcBMTwE/pub?output=csv";

fetch(SHEET)

.then(r=>r.text())

.then(csv=>{

const rows =
csv
.split("\n")
.map(r=>r.split(","));

let html="";

rows.forEach((row,i)=>{

html+="<tr>";

row.forEach(cell=>{

html+=
i===0
? `<th>${cell}</th>`
: `<td>${cell}</td>`;

});

html+="</tr>";

});

document
.getElementById("tbl")
.innerHTML =
html;

document
.getElementById("loading")
.remove();

})

.catch(e=>{

document
.getElementById(
"loading"
).innerHTML =
"❌ Không tải được dữ liệu";

console.log(e);

});

</script>

</body>
</html>
